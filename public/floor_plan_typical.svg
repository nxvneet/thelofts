<svg viewBox="0 0 800 600" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <!-- Warm background to match the project's quiet luxury aesthetic -->
  <rect width="100%" height="100%" fill="#FAF9F6"/>
  
  <g transform="translate(40, 40)">
    <!-- Title and details -->
    <text x="0" y="30" font-family="'Inter', sans-serif" font-size="20" font-weight="600" fill="#1A1A1A" letter-spacing="2">TYPICAL UPPER FLOOR PLAN</text>
    <text x="0" y="50" font-family="'Inter', sans-serif" font-size="10" font-weight="500" fill="#9C8974" letter-spacing="1.5">THE LOFTS · FLOORS 1 TO 6</text>
    
    <!-- Scale Bar -->
    <g transform="translate(580, 25)">
      <line x1="0" y1="10" x2="100" y2="10" stroke="#9C8974" stroke-width="1.5"/>
      <line x1="0" y1="5" x2="0" y2="15" stroke="#9C8974" stroke-width="1.5"/>
      <line x1="50" y1="5" x2="50" y2="15" stroke="#9C8974" stroke-width="1.5"/>
      <line x1="100" y1="5" x2="100" y2="15" stroke="#9C8974" stroke-width="1.5"/>
      <text x="0" y="-2" font-family="'Inter', sans-serif" font-size="8" fill="#666" text-anchor="middle">0</text>
      <text x="50" y="-2" font-family="'Inter', sans-serif" font-size="8" fill="#666" text-anchor="middle">5m</text>
      <text x="100" y="-2" font-family="'Inter', sans-serif" font-size="8" fill="#666" text-anchor="middle">10m</text>
    </g>

    <!-- Compass Rose -->
    <g transform="translate(700, 30)">
      <circle cx="0" cy="0" r="15" fill="none" stroke="#E3E0DC" stroke-width="1"/>
      <line x1="0" y1="-20" x2="0" y2="20" stroke="#9C8974" stroke-width="1.5"/>
      <line x1="-20" y1="0" x2="20" y2="0" stroke="#E3E0DC" stroke-width="1"/>
      <polygon points="0,-20 -4,-5 0,-8" fill="#9C8974"/>
      <polygon points="0,-20 4,-5 0,-8" fill="#B5A695"/>
      <text x="0" y="-24" font-family="'Inter', sans-serif" font-size="8" font-weight="700" fill="#9C8974" text-anchor="middle">N</text>
    </g>

    <!-- Outer Building Boundaries -->
    <rect x="50" y="100" width="620" height="360" rx="8" fill="none" stroke="#E3E0DC" stroke-width="2" stroke-dasharray="4 4"/>
    
    <!-- Central Elevator Core & Corridor -->
    <rect x="280" y="190" width="160" height="180" rx="4" fill="#EAE8E4" stroke="#8A857D" stroke-width="1.5"/>
    <text x="360" y="240" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle" letter-spacing="1">ELEVATOR LOBBY</text>
    
    <!-- Elevator Blocks -->
    <rect x="310" y="260" width="40" height="40" fill="none" stroke="#8A857D" stroke-width="1"/>
    <path d="M320,280 L330,270 L340,280" fill="none" stroke="#8A857D" stroke-width="1.5"/>
    <rect x="370" y="260" width="40" height="40" fill="none" stroke="#8A857D" stroke-width="1"/>
    <path d="M380,280 L390,270 L400,280" fill="none" stroke="#8A857D" stroke-width="1.5"/>

    <!-- Left Wing (Residences) -->
    <g>
      <!-- Unit 3BHK-L1 -->
      <rect x="60" y="110" width="200" height="160" rx="4" fill="#F4F2EE" stroke="#A8A49E" stroke-width="1.5"/>
      <text x="160" y="180" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">3BHK LOFT RESIDENCE</text>
      <text x="160" y="195" font-family="'Inter', sans-serif" font-size="8" font-weight="600" fill="#ff5c35" text-anchor="middle" letter-spacing="0.5">WING A · SEA VIEW</text>
      <text x="160" y="210" font-family="'Inter', sans-serif" font-size="9" fill="#9C8974" text-anchor="middle">403 - 423 SQM.</text>

      <!-- Unit 2BHK-L1 -->
      <rect x="60" y="280" width="200" height="170" rx="4" fill="#F4F2EE" stroke="#A8A49E" stroke-width="1.5"/>
      <text x="160" y="355" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">2BHK LOFT RESIDENCE</text>
      <text x="160" y="370" font-family="'Inter', sans-serif" font-size="8" font-weight="600" fill="#ff5c35" text-anchor="middle" letter-spacing="0.5">WING A · MARINA VIEW</text>
      <text x="160" y="385" font-family="'Inter', sans-serif" font-size="9" fill="#9C8974" text-anchor="middle">195 - 228 SQM.</text>
    </g>

    <!-- Right Wing (Residences) -->
    <g>
      <!-- Unit 1BHK-R1 -->
      <rect x="460" y="110" width="200" height="100" rx="4" fill="#F4F2EE" stroke="#A8A49E" stroke-width="1.5"/>
      <text x="560" y="150" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">1BHK LUXURY RESIDENCE</text>
      <text x="560" y="165" font-family="'Inter', sans-serif" font-size="8" font-weight="600" fill="#ff5c35" text-anchor="middle" letter-spacing="0.5">WING B · PARK VIEW</text>
      <text x="560" y="180" font-family="'Inter', sans-serif" font-size="9" fill="#9C8974" text-anchor="middle">95 SQM.</text>

      <!-- Unit 2BHK-R1 -->
      <rect x="460" y="220" width="200" height="110" rx="4" fill="#F4F2EE" stroke="#A8A49E" stroke-width="1.5"/>
      <text x="560" y="265" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">2BHK LUXURY RESIDENCE</text>
      <text x="560" y="280" font-family="'Inter', sans-serif" font-size="8" font-weight="600" fill="#ff5c35" text-anchor="middle" letter-spacing="0.5">WING B · CITY VIEW</text>
      <text x="560" y="295" font-family="'Inter', sans-serif" font-size="9" fill="#9C8974" text-anchor="middle">120 SQM.</text>

      <!-- Unit Studio-R1 -->
      <rect x="460" y="340" width="200" height="110" rx="4" fill="#F4F2EE" stroke="#A8A49E" stroke-width="1.5"/>
      <text x="560" y="385" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle">STUDIO APARTMENT</text>
      <text x="560" y="400" font-family="'Inter', sans-serif" font-size="8" font-weight="600" fill="#ff5c35" text-anchor="middle" letter-spacing="0.5">WING B · EAST VIEW</text>
      <text x="560" y="415" font-family="'Inter', sans-serif" font-size="9" fill="#9C8974" text-anchor="middle">65 SQM.</text>
    </g>

    <!-- Corridors connecting wings -->
    <rect x="260" y="210" width="20" height="40" fill="#EAE8E4"/>
    <rect x="440" y="210" width="20" height="40" fill="#EAE8E4"/>
    <rect x="260" y="320" width="20" height="40" fill="#EAE8E4"/>
    <rect x="440" y="320" width="20" height="40" fill="#EAE8E4"/>
  </g>
</svg>
