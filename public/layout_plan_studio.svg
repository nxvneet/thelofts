<svg viewBox="0 0 800 600" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <!-- Clean background for blueprint -->
  <rect width="100%" height="100%" fill="#FAF9F6"/>
  
  <g transform="translate(40, 40)">
    <!-- Title block -->
    <text x="0" y="30" font-family="'Inter', sans-serif" font-size="22" font-weight="600" fill="#1A1A1A" letter-spacing="2">LUXURY STUDIO RESIDENCE</text>
    <text x="0" y="50" font-family="'Inter', sans-serif" font-size="10" font-weight="500" fill="#9C8974" letter-spacing="1.5">FLOOR PLAN &amp; SPACE LAYOUT · 65 SQM.</text>

    <!-- Room dimensions / labels -->
    <g transform="translate(20, 80)">
      <!-- Main Outer wall -->
      <rect x="160" y="40" width="380" height="380" fill="none" stroke="#1A1A1A" stroke-width="3.5"/>
      <rect x="162" y="42" width="376" height="376" fill="none" stroke="#FAF9F6" stroke-width="1.5"/>
      
      <!-- Inner walls dividing rooms -->
      <!-- Top side: Foyer, Kitchen & Bath -->
      <line x1="160" y1="180" x2="540" y2="180" stroke="#1A1A1A" stroke-width="2.5"/>
      <!-- Divider between Bath and Kitchen -->
      <line x1="320" y1="40" x2="320" y2="180" stroke="#1A1A1A" stroke-width="2"/>

      <!-- Room Labels and furniture guides -->
      <!-- Bathroom (Top Left) -->
      <text x="240" y="90" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle" letter-spacing="1">FULL BATHROOM</text>
      <text x="240" y="105" font-family="'Inter', sans-serif" font-size="9" fill="#9C8974" text-anchor="middle">3.2m x 2.4m</text>
      <!-- Shower -->
      <rect x="180" y="120" width="40" height="40" fill="none" stroke="#C2BFB9" stroke-width="1"/>
      <line x1="180" y1="120" x2="220" y2="160" stroke="#C2BFB9" stroke-width="0.5"/>
      <line x1="220" y1="120" x2="180" y2="160" stroke="#C2BFB9" stroke-width="0.5"/>

      <!-- Kitchen / Foyer (Top Right) -->
      <text x="430" y="90" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle" letter-spacing="1">KITCHENETTE</text>
      <text x="430" y="105" font-family="'Inter', sans-serif" font-size="9" fill="#9C8974" text-anchor="middle">3.6m x 2.4m</text>
      <!-- Counter -->
      <rect x="360" y="130" width="140" height="25" fill="none" stroke="#D2CFC9" stroke-width="1"/>

      <!-- Studio Living & Sleeping Zone (Bottom Area) -->
      <text x="350" y="240" font-family="'Inter', sans-serif" font-size="11" font-weight="600" fill="#1A1A1A" text-anchor="middle" letter-spacing="1">LIVING &amp; SLEEPING SUITE</text>
      <text x="350" y="255" font-family="'Inter', sans-serif" font-size="9" fill="#9C8974" text-anchor="middle">5.8m x 4.8m</text>
      
      <!-- Bed representation -->
      <rect x="200" y="290" width="75" height="70" fill="none" stroke="#D2CFC9" stroke-width="1"/>
      <rect x="208" y="290" width="25" height="15" fill="none" stroke="#D2CFC9" stroke-width="1"/>
      <rect x="242" y="290" width="25" height="15" fill="none" stroke="#D2CFC9" stroke-width="1"/>
      
      <!-- Sofa / Lounger -->
      <path d="M 420 290 L 480 290 L 480 320 L 470 320 L 470 305 L 430 305 L 430 320 L 420 320 Z" fill="none" stroke="#D2CFC9" stroke-width="1"/>

      <!-- Balcony (Bottom Outside Wall) -->
      <rect x="260" y="420" width="180" height="30" fill="#EDEAE6" stroke="#1A1A1A" stroke-width="2"/>
      <text x="350" y="440" font-family="'Inter', sans-serif" font-size="8" font-weight="600" fill="#1A1A1A" text-anchor="middle" letter-spacing="1.5">PRIVATE BALCONY</text>

      <!-- Door Swings -->
      <!-- Bathroom Door -->
      <path d="M 320 120 A 30 30 0 0 1 290 150 L 320 150 Z" fill="none" stroke="#8A857D" stroke-width="1"/>
    </g>
  </g>
</svg>
